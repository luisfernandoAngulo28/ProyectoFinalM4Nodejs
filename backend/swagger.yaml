openapi: 3.0.0
info:
  title: ApiDiplomadoModulo4
  description: API REST para gestión de usuarios y tareas con paginación
  version: 1.0.0
  contact:
    name: Diplomado Node.js
servers:
  - url: https://proyectofinalm4nodejs.onrender.com
    description: Servidor de producción (Render)
  - url: http://localhost:3000
    description: Servidor de desarrollo local

tags:
  - name: Auth
    description: Autenticación de usuarios
  - name: Users
    description: Operaciones CRUD de usuarios
  - name: Tasks
    description: Operaciones CRUD de tareas
  - name: Sequelize Test
    description: Endpoints de prueba usando Sequelize ORM (para comparar con pg driver)

paths:
  /api/login:
    post:
      tags:
        - Auth
      summary: Login de usuario
      description: Autentica un usuario y retorna un token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "admin"
                password:
                  type: string
                  example: "admin123"
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Login exitoso"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      username:
                        type: string
                        example: "admin"
                      status:
                        type: string
                        example: "active"
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Usuario inactivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/users:
    get:
      tags:
        - Users
      summary: Obtener todos los usuarios
      description: Retorna una lista con todos los usuarios registrados
      responses:
        '200':
          description: Lista de usuarios obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      tags:
        - Users
      summary: Crear un nuevo usuario
      description: Crea un nuevo usuario en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "nuevouser"
                password:
                  type: string
                  example: "password123"
                status:
                  type: string
                  example: "active"
                  default: "active"
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuario creado exitosamente"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El username ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/bulk:
    post:
      tags:
        - Users
      summary: Crear múltiples usuarios
      description: Crea múltiples usuarios en el sistema en una sola petición
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - users
              properties:
                users:
                  type: array
                  items:
                    type: object
                    required:
                      - username
                      - password
                    properties:
                      username:
                        type: string
                        example: "user1"
                      password:
                        type: string
                        example: "password123"
                      status:
                        type: string
                        example: "active"
                        default: "active"
            example:
              users:
                - username: "user1"
                  password: "password123"
                  status: "active"
                - username: "user2"
                  password: "password456"
                  status: "inactive"
                - username: "user3"
                  password: "password789"
      responses:
        '201':
          description: Usuarios creados exitosamente (pueden haber errores parciales)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "3 usuarios creados exitosamente"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                          example: "user1"
                        error:
                          type: string
                          example: "El username ya existe"
              example:
                success: true
                message: "2 usuarios creados exitosamente"
                data:
                  - id: 10
                    username: "user2"
                    status: "inactive"
                  - id: 11
                    username: "user3"
                    status: "active"
                errors:
                  - username: "user1"
                    error: "El username ya existe"
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Obtener usuario por ID
      description: Retorna un usuario específico por su ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    put:
      tags:
        - Users
      summary: Actualizar usuario
      description: Actualiza los datos de un usuario existente
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario a actualizar
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "usuarioActualizado"
                password:
                  type: string
                  example: "newpassword123"
                status:
                  type: string
                  example: "inactive"
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuario actualizado exitosamente"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: No hay campos para actualizar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El username ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    patch:
      tags:
        - Users
      summary: Actualizar parcialmente usuario
      description: Actualiza parcialmente los datos de un usuario existente (solo los campos enviados)
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario a actualizar
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "usuarioActualizado"
                password:
                  type: string
                  example: "newpassword123"
                status:
                  type: string
                  example: "inactive"
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuario actualizado exitosamente"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: No hay campos para actualizar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El username ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    delete:
      tags:
        - Users
      summary: Eliminar usuario
      description: Elimina un usuario del sistema
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario a eliminar
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Usuario eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuario eliminado exitosamente"
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      username:
                        type: string
                        example: "admin"
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/list/pagination:
    get:
      tags:
        - Users
      summary: Listar usuarios con paginación (30 pts)
      description: Retorna una lista paginada de usuarios con búsqueda y ordenamiento
      parameters:
        - name: page
          in: query
          description: Número de la página
          schema:
            type: integer
            default: 1
            example: 1
        - name: limit
          in: query
          description: Cantidad de registros por página
          schema:
            type: integer
            enum: [5, 10, 15, 20]
            default: 10
            example: 5
        - name: search
          in: query
          description: Búsqueda de username (ILIKE). Si no existe, muestra todos
          schema:
            type: string
            example: "use"
        - name: orderBy
          in: query
          description: Campo por el cual ordenar
          schema:
            type: string
            enum: [id, username, status]
            default: id
            example: "username"
        - name: orderDir
          in: query
          description: Dirección del ordenamiento
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
            example: "DESC"
      responses:
        '200':
          description: Lista paginada obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    description: Total de registros
                    example: 20
                  page:
                    type: integer
                    description: Número de página actual
                    example: 1
                  pages:
                    type: integer
                    description: Total de páginas
                    example: 4
                  data:
                    type: array
                    description: Array de usuarios (id, username, status)
                    items:
                      $ref: '#/components/schemas/User'
              example:
                success: true
                total: 20
                page: 1
                pages: 4
                data:
                  - id: 3
                    username: "user2"
                    status: "inactive"
                  - id: 2
                    username: "user1"
                    status: "active"
                  - id: 4
                    username: "testuser"
                    status: "active"
        '400':
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tasks:
    get:
      tags:
        - Tasks
      summary: Obtener todas las tareas
      description: Retorna una lista con todas las tareas registradas
      responses:
        '200':
          description: Lista de tareas obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TaskWithUser'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      tags:
        - Tasks
      summary: Crear una nueva tarea
      description: Crea una nueva tarea en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - user_id
              properties:
                name:
                  type: string
                  example: "Completar proyecto final"
                done:
                  type: boolean
                  example: false
                  default: false
                user_id:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Tarea creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Tarea creada exitosamente"
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Obtener tarea por ID
      description: Retorna una tarea específica por su ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la tarea
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Tarea encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TaskWithUser'
        '404':
          description: Tarea no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    put:
      tags:
        - Tasks
      summary: Actualizar tarea
      description: Actualiza los datos de una tarea existente
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la tarea a actualizar
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Tarea actualizada"
                done:
                  type: boolean
                  example: true
                user_id:
                  type: integer
                  example: 2
      responses:
        '200':
          description: Tarea actualizada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Tarea actualizada exitosamente"
                  data:
                    $ref: '#/components/schemas/Task'
        '400':
          description: No hay campos para actualizar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tarea no encontrada o usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    delete:
      tags:
        - Tasks
      summary: Eliminar tarea
      description: Elimina una tarea del sistema
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la tarea a eliminar
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Tarea eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Tarea eliminada exitosamente"
                  data:
                    $ref: '#/components/schemas/Task'
        '404':
          description: Tarea no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tasks/user/{userId}:
    get:
      tags:
        - Tasks
      summary: Obtener tareas por usuario
      description: Retorna todas las tareas de un usuario específico
      parameters:
        - name: userId
          in: path
          required: true
          description: ID del usuario
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Lista de tareas del usuario
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TaskWithUser'
        '500':
          description: Error del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # ENDPOINTS DE PRUEBA CON SEQUELIZE ORM
  # ========================================
  
  /api/v2/test:
    get:
      tags:
        - Sequelize Test
      summary: Información de endpoints de prueba
      description: Lista todos los endpoints disponibles con Sequelize ORM para comparar con pg driver
      responses:
        '200':
          description: Lista de endpoints disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Endpoints de Prueba con Sequelize ORM"
                  endpoints:
                    type: array
                    items:
                      type: object

  /api/v2/test/users:
    get:
      tags:
        - Sequelize Test
      summary: Listar usuarios (Sequelize)
      description: Obtener últimos 10 usuarios usando Sequelize ORM (compara con GET /api/users que usa pg)
      responses:
        '200':
          description: Lista de usuarios obtenida con Sequelize
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuarios obtenidos con Sequelize ORM"
                  count:
                    type: integer
                    example: 10
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '500':
          description: Error del servidor

  /api/v2/test/users/{id}:
    get:
      tags:
        - Sequelize Test
      summary: Obtener usuario por ID (Sequelize)
      description: Obtener un usuario específico usando Sequelize findByPk
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario
          example: 8
      responses:
        '200':
          description: Usuario obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuario obtenido con Sequelize ORM"
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado
        '500':
          description: Error del servidor

  /api/v2/test/users/{id}/tasks:
    get:
      tags:
        - Sequelize Test
      summary: Usuario con sus tareas (JOIN automático)
      description: Obtener usuario con todas sus tareas usando Sequelize include (JOIN automático sin escribir SQL)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del usuario
          example: 8
      responses:
        '200':
          description: Usuario con tareas obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuario con tareas obtenido usando Sequelize JOIN"
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 8
                          username:
                            type: string
                            example: "superman"
                          status:
                            type: string
                            example: "active"
                      tasks:
                        type: array
                        items:
                          $ref: '#/components/schemas/Task'
                      totalTasks:
                        type: integer
                        example: 4
        '404':
          description: Usuario no encontrado
        '500':
          description: Error del servidor

  /api/v2/test/search:
    get:
      tags:
        - Sequelize Test
      summary: Buscar usuarios (Sequelize Op.iLike)
      description: Buscar usuarios por username usando operador iLike de Sequelize (case-insensitive)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Texto a buscar en username
          example: "super"
      responses:
        '200':
          description: Resultados de búsqueda
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Búsqueda usando Sequelize Op.iLike"
                  query:
                    type: string
                    example: "super"
                  count:
                    type: integer
                    example: 1
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '400':
          description: Parámetro de búsqueda requerido
        '500':
          description: Error del servidor

  /api/v2/test/active-users:
    get:
      tags:
        - Sequelize Test
      summary: Usuarios activos (Sequelize WHERE)
      description: Obtener solo usuarios con status = 'active' usando Sequelize where clause
      responses:
        '200':
          description: Lista de usuarios activos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuarios activos obtenidos con Sequelize WHERE"
                  count:
                    type: integer
                    example: 19
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '500':
          description: Error del servidor

  /api/v2/test/tasks/pending:
    get:
      tags:
        - Sequelize Test
      summary: Tareas pendientes (Sequelize)
      description: Obtener todas las tareas con done = false, incluyendo información del usuario (JOIN inverso)
      responses:
        '200':
          description: Lista de tareas pendientes con usuario
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Tareas pendientes con información de usuario (JOIN)"
                  count:
                    type: integer
                    example: 15
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TaskWithUser'
        '500':
          description: Error del servidor

  /api/v2/test/stats:
    get:
      tags:
        - Sequelize Test
      summary: Estadísticas (Sequelize count)
      description: Obtener estadísticas generales usando funciones de agregación de Sequelize
      responses:
        '200':
          description: Estadísticas obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Estadísticas usando Sequelize count()"
                  data:
                    type: object
                    properties:
                      users:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 22
                          active:
                            type: integer
                            example: 19
                          inactive:
                            type: integer
                            example: 3
                      tasks:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 25
                          completed:
                            type: integer
                            example: 10
                          pending:
                            type: integer
                            example: 15
        '500':
          description: Error del servidor

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: "admin"
        status:
          type: string
          example: "active"
    
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Completar proyecto Node.js"
        done:
          type: boolean
          example: false
        user_id:
          type: integer
          example: 1
    
    TaskWithUser:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Completar proyecto Node.js"
        done:
          type: boolean
          example: false
        user_id:
          type: integer
          example: 1
        username:
          type: string
          example: "admin"
    
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Error al procesar la solicitud"
        error:
          type: string
          example: "Detalle del error"
